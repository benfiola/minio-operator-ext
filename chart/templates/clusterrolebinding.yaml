{{- if .Values.rbac.create -}}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "minio-operator-ext.clusterRoleName" . }}
  labels:
    {{- include "minio-operator-ext.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "minio-operator-ext.clusterRoleName" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "minio-operator-ext.serviceAccountName" . }}
{{- end }}
